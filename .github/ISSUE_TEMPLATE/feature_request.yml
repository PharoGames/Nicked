name: Feature Request
description: Suggest a new feature or improvement for Nicked
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea clearly so we can evaluate it.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like to see.
      placeholder: "Example: Add a configurable cooldown between nick changes to prevent rapid cycling."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this feature? What problem does it solve or what workflow does it improve?
      placeholder: "Example: On public servers, players can rapidly change nicks to avoid being identified. A cooldown would make this harder."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: If you have an idea for how this could work, describe it here. This is optional.
      placeholder: "Example: A `nick_cooldown_seconds` option in config.yml that prevents a player from running /nick again until the cooldown expires."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches or workarounds you've already tried or thought about.
    validations:
      required: false
